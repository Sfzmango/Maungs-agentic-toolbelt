name: validate

on:
  push:
  pull_request:

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Seed the job summary table. Every check below appends one row, so the
      # summary shows ALL results (pass and fail) at a glance — not just the
      # first failure. `if: always()` on every check keeps them all running and
      # reporting even after one fails; the job still goes red if any step exits non-zero.
      - name: Init summary
        if: always()
        run: |
          {
            echo "## validate — check results"
            echo ""
            echo "| # | Check | Result | Detail |"
            echo "|---|-------|--------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 1 · Frontmatter — every agent & skill declares a name
        if: always()
        run: |
          echo "::group::Frontmatter (agents/*.md + skills/*/SKILL.md)"
          fail=0; n=0; okc=0
          for f in agents/*.md skills/*/SKILL.md; do
            n=$((n+1))
            if [ "$(head -1 "$f")" != "---" ]; then
              echo "  ✗ FAIL $f — missing YAML frontmatter (must start with ---)"
              echo "::error file=$f::missing YAML frontmatter (must start with ---)"; fail=1; continue
            fi
            if ! sed -n '2,/^---$/p' "$f" | grep -q '^name:'; then
              echo "  ✗ FAIL $f — frontmatter missing a 'name:' field"
              echo "::error file=$f::frontmatter is missing a 'name:' field"; fail=1; continue
            fi
            echo "  ✓ PASS $f"; okc=$((okc+1))
          done
          echo "::endgroup::"
          if [ "$fail" -eq 0 ]; then
            echo "Frontmatter: ✅ PASS — all $n files declare a name"
            echo "| 1 | Frontmatter | ✅ PASS | $okc/$n files declare a name |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Frontmatter: ❌ FAIL — $((n-okc))/$n files bad"
            echo "| 1 | Frontmatter | ❌ FAIL | $okc/$n ok, $((n-okc)) bad |" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $fail

      - name: 2 · No private or employer references leak in
        if: always()
        run: |
          # A safety gate: the public repo must never contain private project
          # names, employer identities, or absolute home paths.
          echo "::group::Leak-grep (*.md *.json *.sh, excluding .git/.github)"
          rc=0
          matches="$(grep -rniE 'botdo|accrualify|/Users/[a-z]' \
               --include='*.md' --include='*.json' --include='*.sh' \
               --exclude-dir=.git --exclude-dir=.github .)" || rc=$?
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            echo "::error::found a private reference above — scrub it before merging"
            echo "::endgroup::"
            cnt="$(printf '%s\n' "$matches" | grep -c . )"
            echo "Leak-grep: ❌ FAIL — $cnt match(es)"
            echo "| 2 | Leak-grep | ❌ FAIL | $cnt private-reference match(es) |" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "  ✓ clean — no private references found"
          echo "::endgroup::"
          echo "Leak-grep: ✅ PASS — 0 matches"
          echo "| 2 | Leak-grep | ✅ PASS | 0 matches |" >> "$GITHUB_STEP_SUMMARY"

      - name: 3 · Prompt router routes prompts to the intended components
        if: always()
        run: |
          echo "::group::Prompt-router regression (verbose — every case)"
          rc=0
          out="$(python3 tests/test_router.py -v 2>&1)" || rc=$?
          printf '%s\n' "$out"
          echo "::endgroup::"
          detail="$(printf '%s\n' "$out" | grep -m1 -E '^TOTAL PROMPTS' \
                    | sed -E 's/.*TOTAL PROMPTS: ([0-9]+).*PASS: ([0-9]+).*FAIL: ([0-9]+).*/\2\/\1 routed, \3 mis-routed/')"
          if [ "$rc" -eq 0 ]; then
            echo "Prompt router: ✅ PASS — ${detail:-ok}"
            echo "| 3 | Prompt router | ✅ PASS | ${detail:-see log} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Prompt router: ❌ FAIL — ${detail:-see log}"
            echo "| 3 | Prompt router | ❌ FAIL | ${detail:-see log} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc

      - name: 4 · Translator eval — reference solutions pass their vectors (multi-language)
        if: always()
        run: |
          echo "::group::Translator eval --check (verbose — per-language / per-problem)"
          rc=0
          out="$(python3 tests/translator_eval/eval.py -v 2>&1)" || rc=$?
          printf '%s\n' "$out"
          echo "::endgroup::"
          detail="$(printf '%s\n' "$out" | grep -m1 -E '^\[--check\]' \
                    | sed -E 's/^\[--check\] ([0-9]+\/[0-9]+) reference case-runs pass \| ([0-9]+) problems.*/\1 case-runs, \2 problems/')"
          if [ "$rc" -eq 0 ]; then
            echo "Translator eval: ✅ PASS — ${detail:-ok}"
            echo "| 4 | Translator eval | ✅ PASS | ${detail:-see log} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Translator eval: ❌ FAIL — ${detail:-see log}"
            echo "| 4 | Translator eval | ❌ FAIL | ${detail:-see log} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc

      - name: 5 · Component descriptions stay in sync with the real counts
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Derive the real counts from the filesystem and assert every description
          # matches. Adding/removing an agent or skill forces a description update here.
          echo "::group::Component-count consistency"
          A=$(ls agents/*.md | wc -l | tr -d ' ')
          S=$(ls skills/*/SKILL.md | wc -l | tr -d ' ')
          C=$((A + S))
          echo "Derived from filesystem: ${A} agents + ${S} skills = ${C} components"
          echo ""
          fail=0; n=0; okc=0
          chk() {
            n=$((n+1))
            if grep -qF "$2" "$1"; then
              echo "  ✓ PASS $1 — \"$2\""; okc=$((okc+1))
            else
              echo "  ✗ FAIL $1 — expected \"$2\""
              echo "::error file=$1::stale count — expected \"$2\" (did you add/remove a component?)"; fail=1
            fi
          }
          chk README.md                        "${A} agents + ${S} skills"
          chk README.md                        "all ${C} components"
          chk docs/components.md               "**${C} components**"
          chk docs/components.md               "**${A} agents**"
          chk docs/architecture.md             "${A} agents + ${S} skills = ${C} components"
          chk docs/design-philosophy.md        "${A} agents + ${S} skills (${C} components)"
          chk .claude-plugin/plugin.json       "${A} subagents + ${S} skills"
          chk .claude-plugin/marketplace.json  "${A} agents + ${S} skills"
          echo "::endgroup::"
          # The GitHub repo "About" is out-of-band metadata (not a file in the repo and not
          # writable by the default GITHUB_TOKEN), so we WARN with the exact fix rather than
          # fail — keeping it in sync is a documented release step (see CONTRIBUTING.md).
          want="${A} agents + ${S} skills"
          desc="$(gh repo view "$GITHUB_REPOSITORY" --json description --jq .description 2>/dev/null || true)"
          if [ -n "$desc" ] && ! printf '%s' "$desc" | grep -qF "$want"; then
            echo "::warning::GitHub 'About' is stale (want \"$want\"). Fix: gh repo edit $GITHUB_REPOSITORY --description \"...\""
            echo "GitHub 'About': ⚠️ stale (want \"$want\")"
          fi
          if [ "$fail" -eq 0 ]; then
            echo "Component counts: ✅ PASS — ${okc}/${n} count strings match (${A} agents + ${S} skills = ${C})"
            echo "| 5 | Component counts | ✅ PASS | ${okc}/${n} strings match (${A}+${S}=${C}) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Component counts: ❌ FAIL — $((n-okc))/${n} count strings stale"
            echo "| 5 | Component counts | ❌ FAIL | $((n-okc))/${n} stale |" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $fail

      - name: 6 · Interview catalogs — each catalog's buckets appear in its consumer(s)
        if: always()
        run: |
          # Drift guard for the interview-catalog pattern (docs/design-philosophy.md §8).
          # Each consuming component EMBEDS its catalog's buckets so it is self-contained at
          # runtime; that embedded copy can drift from the canonical catalog file. For every
          # catalog we derive its bucket headers FROM the catalog file (so adding a bucket
          # auto-extends coverage), then assert each one appears verbatim in every declared
          # consumer. A consumer missing a bucket — or a declared-but-absent consumer (orphan
          # catalog) — fails the build, same family as the count-string drift guard above.
          echo "::group::Interview-catalog drift (catalog buckets ⊆ each consumer)"
          fail=0; total=0; okc=0; checked=""
          # Each entry: "<catalog file> <consumer file> [<consumer file> ...]".
          # Add a row here (and the catalog under docs/interview-catalogs/) for a new catalog.
          check_catalog() {
            catalog="$1"; shift; checked="$checked $catalog"
            if [ ! -f "$catalog" ]; then
              echo "  ✗ FAIL $catalog — catalog file not found"
              echo "::error file=$catalog::declared catalog file is missing"; fail=1; return
            fi
            # Bucket headers are markdown lines like "### Bucket 1 — Product framing"; the
            # consumer embeds the same "Bucket N — <name>" text at a different heading depth,
            # so we match the heading TEXT (leading #'s + spaces stripped) as a fixed substring.
            # Write them to a temp file so the while-loop below reads via a redirect (not a
            # pipe) and its counters survive — no subshell, no heredoc to de-indent the YAML.
            bfile="$(mktemp)"
            grep -E '^#+ Bucket [0-9]+ [—–-] ' "$catalog" | sed -E 's/^#+ //' > "$bfile"
            if [ ! -s "$bfile" ]; then
              echo "  ✗ FAIL $catalog — no 'Bucket N — <name>' headers found"
              echo "::error file=$catalog::catalog defines no buckets"; fail=1; rm -f "$bfile"; return
            fi
            for consumer in "$@"; do
              if [ ! -f "$consumer" ]; then
                echo "  ✗ FAIL $catalog — declared consumer $consumer not found (orphan catalog)"
                echo "::error file=$catalog::declared consumer $consumer is missing"; fail=1; continue
              fi
              while IFS= read -r bucket; do
                [ -z "$bucket" ] && continue
                total=$((total+1))
                if grep -qF -- "$bucket" "$consumer"; then
                  echo "  ✓ PASS $consumer ⊇ \"$bucket\" (from $catalog)"; okc=$((okc+1))
                else
                  echo "  ✗ FAIL $consumer — missing \"$bucket\" (from $catalog)"
                  echo "::error file=$consumer::interview-catalog drift — embed \"$bucket\" from $catalog"
                  fail=1
                fi
              done < "$bfile"
            done
            rm -f "$bfile"
          }
          check_catalog docs/interview-catalogs/greenfield.md agents/architect.md
          check_catalog docs/interview-catalogs/migration.md  skills/migration-planner/SKILL.md
          # Orphan-catalog guard: every catalog file MUST be covered by a check_catalog
          # row above, so a new docs/interview-catalogs/*.md cannot ship unguarded.
          for cat in docs/interview-catalogs/*.md; do
            [ "$(basename "$cat")" = "README.md" ] && continue
            case " $checked " in
              *" $cat "*) ;;
              *) echo "  ✗ FAIL $cat — catalog has no drift-check row (orphan)"
                 echo "::error file=$cat::add a check_catalog row for this catalog"; fail=1 ;;
            esac
          done
          echo "::endgroup::"
          if [ "$fail" -eq 0 ]; then
            echo "Interview catalogs: ✅ PASS — ${okc}/${total} bucket→consumer checks match"
            echo "| 6 | Interview catalogs | ✅ PASS | ${okc}/${total} bucket→consumer checks |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Interview catalogs: ❌ FAIL — $((total-okc))/${total} bucket→consumer checks drifted"
            echo "| 6 | Interview catalogs | ❌ FAIL | $((total-okc))/${total} drifted |" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $fail

      - name: 7 · Guard precision — quoted-argument & cross-segment force-flag false-positives
        if: always()
        run: |
          echo "::group::PreToolUse-guard regression (verbose — every case)"
          rc=0
          out="$(python3 tests/test_pretooluse_guard.py -v 2>&1)" || rc=$?
          printf '%s\n' "$out"
          echo "::endgroup::"
          detail="$(printf '%s\n' "$out" | grep -m1 -E '^TOTAL COMMANDS' \
                    | sed -E 's/.*TOTAL COMMANDS: ([0-9]+).*PASS: ([0-9]+).*FAIL: ([0-9]+).*/\2\/\1 decided, \3 wrong/')"
          if [ "$rc" -eq 0 ]; then
            echo "Guard precision: ✅ PASS — ${detail:-ok}"
            echo "| 7 | Guard precision | ✅ PASS | ${detail:-see log} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Guard precision: ❌ FAIL — ${detail:-see log}"
            echo "| 7 | Guard precision | ❌ FAIL | ${detail:-see log} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc
